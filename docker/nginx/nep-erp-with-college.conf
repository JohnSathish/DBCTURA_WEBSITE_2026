# Full nginx.conf for /opt/nep-erp/nginx/nginx.conf
# Includes ERP subdomains + donboscocollege.ac.in → college container
#
# Before use: set COLLEGE_UPSTREAM to college container IP on ERP network:
#   ERP_NET=$(docker inspect nep-erp-nginx-1 --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}' | awk '{print $1}')
#   docker network connect "$ERP_NET" donboscocollege-web 2>/dev/null || true
#   COLLEGE_IP=$(docker network inspect "$ERP_NET" -f '{{range .Containers}}{{if eq .Name "donboscocollege-web"}}{{.IPv4Address}}{{end}}{{end}}' | cut -d/ -f1)
#   sed -i "s/COLLEGE_UPSTREAM/${COLLEGE_IP}:3000/" /opt/nep-erp/nginx/nginx.conf

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 25m;

  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream web_upstream {
    zone web_upstream 64k;
    server web:3000 resolve max_fails=3 fail_timeout=15s;
    keepalive 16;
  }

  upstream api_upstream {
    zone api_upstream 64k;
    server api:3001 resolve max_fails=3 fail_timeout=15s;
  }

  upstream donboscocollege_upstream {
    server COLLEGE_UPSTREAM;
  }

  # MAIN DOMAIN — College website (must be before ERP blocks on port 80)
  server {
    listen 80;
    server_name donboscocollege.ac.in www.donboscocollege.ac.in;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # MAIN DOMAIN — College website HTTPS
  server {
    listen 443 ssl;
    http2 on;
    server_name donboscocollege.ac.in www.donboscocollege.ac.in;

    ssl_certificate     /etc/letsencrypt/live/donboscocollege.ac.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/donboscocollege.ac.in/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
      proxy_pass http://donboscocollege_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ERP subdomains — HTTP
  server {
    listen 80;
    server_name
      erp.donboscocollege.ac.in
      admissions.donboscocollege.ac.in
      library.donboscocollege.ac.in;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ERP subdomains — HTTPS
  server {
    listen 443 ssl;
    http2 on;
    server_name
      erp.donboscocollege.ac.in
      admissions.donboscocollege.ac.in
      library.donboscocollege.ac.in;

    ssl_certificate     /etc/letsencrypt/live/erp.donboscocollege.ac.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.donboscocollege.ac.in/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;

    error_page 500 502 503 504 = @json_gateway_error;

    location /api/ {
      proxy_intercept_errors off;
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Connection "close";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_connect_timeout 15s;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_next_upstream_tries 3;
      proxy_next_upstream_timeout 45s;
    }

    location /uploads/ {
      proxy_intercept_errors off;
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
      proxy_read_timeout   3600s;
      proxy_send_timeout   3600s;
    }

    location / {
      proxy_pass         http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location @json_gateway_error {
      default_type application/json;
      add_header Cache-Control "no-store" always;
      return 502 '{"success":false,"errorCode":"API_GATEWAY_UNAVAILABLE","message":"Upstream service is unavailable.","details":{"gateway":"nginx"},"timestamp":"$time_iso8601","traceId":"$request_id"}';
    }
  }

  server {
    listen 80;
    server_name localhost;

    location /api/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }

    location / {
      proxy_pass         http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }
  }
}
