# Add this file inside the NEP ERP nginx container mount, e.g.:
#   /opt/nep-erp/nginx/conf.d/donboscocollege.ac.in.conf
# Then reload nginx ONLY (do not restart ERP web/api):
#   docker exec nep-erp-nginx-1 nginx -t
#   docker exec nep-erp-nginx-1 nginx -s reload
#
# College app listens on HOST port 3002 (donboscocollege-web container).
# From inside nep-erp-nginx, reach the host via host.docker.internal (Docker 20.10+).

upstream donboscocollege_upstream {
    server host.docker.internal:3002;
}

server {
    listen 80;
    server_name donboscocollege.ac.in www.donboscocollege.ac.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name donboscocollege.ac.in www.donboscocollege.ac.in;

    # Use certbot paths after: certbot certonly --webroot ... 
    # Or copy Let's Encrypt paths from your ERP nginx SSL setup pattern.
    ssl_certificate     /etc/letsencrypt/live/donboscocollege.ac.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/donboscocollege.ac.in/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://donboscocollege_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
