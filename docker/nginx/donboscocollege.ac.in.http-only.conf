# STEP 1 — Use this file FIRST if donboscocollege.ac.in shows the ERP site.
# Copy to: /opt/nep-erp/nginx/conf.d/donboscocollege.ac.in.conf
# Then: docker exec nep-erp-nginx-1 nginx -t && docker exec nep-erp-nginx-1 nginx -s reload
#
# After routing works on http://donboscocollege.ac.in, get SSL and switch to
# donboscocollege.ac.in.conf (HTTPS version).

upstream donboscocollege_upstream {
    server host.docker.internal:3002;
    # If host.docker.internal fails, use: server 172.17.0.1:3002;
}

server {
    listen 80;
    server_name donboscocollege.ac.in www.donboscocollege.ac.in;

    client_max_body_size 25m;

    location / {
        proxy_pass http://donboscocollege_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
